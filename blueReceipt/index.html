<!DOCTYPE html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="section_1">

        <h2 class="logo">BlueRecipt</h2>
        <div class="receipt">
            <div class="amount">
                <p>Pay BlueRecipt</p>
                <p>$169.00</p>
            </div>
            

            <div class="item_name">
                <h2>Penguin0 <br> Design System</h2>
                <p>V7.0</p>
            </div>
                <table>
                    <caption>Summary</caption>
                    <tr> <td>Items subtotal <br><span>1 item</span></td><td>$169.00</td></tr>

                    <tr><td>Tax</td><td>$1.00</td></tr>
                    <tr><td>Order Total</td><td>$170.00</td></tr>
                </table>
            <div class="footer_receipt">
                <p>Instant Delivery to Email/SMS</p>
                <p>Free Shipping</p>
            </div>
        </div>
    </div>

    <!-- section 2 -->

    <div class="section_2">
        <div class="checkout_steps">
            <ul>
                <li><span>1</span> Info</li>
                <li><span>2</span> Payment</li>
                <li><span>3</span> Confirm</li>
            </ul>
        </div>
        <h2>Information</h2>
        <div class="Information">
            <form action="">

                <label for="name">Name *</label>
                <input type="text" id="name" placeholder="Full Name">   
                
                <label for="email">Email *</label>
                <input type="text" id="email" placeholder="username@gmail_hostname.com">

                <label for="phone">Phone *</label>

                <input type="tel">
            </form>
        </div>
    </div>
</body>
</html>
